name: Firmware Build

on:
  pull_request:
    branches: ["*"]
    paths:
      - "firmware/**"
      - ".github/workflows/firmware-build.yml"
  push:
    branches: [develop, main]
    paths:
      - "firmware/**"
      - ".github/workflows/firmware-build.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Firmware Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install espup and Xtensa toolchain
        run: |
          curl -L https://github.com/esp-rs/espup/releases/latest/download/espup-x86_64-unknown-linux-gnu -o espup
          chmod +x espup
          ./espup install --targets esp32s3
          echo "$HOME/.rustup/toolchains/esp/bin" >> $GITHUB_PATH
          echo "$HOME/export-esp.sh" >> $GITHUB_ENV

      - name: Source ESP environment
        run: |
          . $HOME/export-esp.sh

      - name: Format check
        working-directory: firmware
        run: cargo fmt --check

      - name: Clippy
        working-directory: firmware
        run: |
          . $HOME/export-esp.sh
          cargo clippy -- -D warnings

      - name: Build
        working-directory: firmware
        run: |
          . $HOME/export-esp.sh
          cargo build
